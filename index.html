<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu AR Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        :root { --colore-principale: #000; --font-titoli: 'Playfair Display', serif; --font-corpo: 'Poppins', sans-serif; }
        body { font-family: var(--font-corpo); margin: 0; background: #fff; overflow-x: hidden; }

        /* MODAL INSTALLAZIONE */
        #install-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 999; display: flex; 
            align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .modal-content { 
            background: white; padding: 30px; border-radius: 25px; text-align: center; 
            width: 85%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .modal-content h3 { font-family: var(--font-titoli); margin-top: 0; }
        .btn-install { 
            background: var(--colore-principale); color: white; border: none; 
            padding: 15px 25px; border-radius: 50px; font-weight: 600; width: 100%; margin-bottom: 10px;
        }
        .btn-web { background: transparent; border: 1px solid #ddd; padding: 12px; width: 100%; border-radius: 50px; font-size: 0.9rem; }

        /* HEADER */
        header { text-align: center; padding: 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 100; }
        .logo-testo { font-family: var(--font-titoli); font-size: 1.4rem; margin: 0; }

        /* LISTA */
        .screen { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background: #f4f4f4; padding: 8px 15px; border-radius: 10px; font-weight: 600; font-size: 0.8rem; }

        /* CARDS */
        .btn-macro { height: 160px; border-radius: 20px; margin-bottom: 20px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .btn-macro img { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
        .btn-macro span { position: relative; color: white; font-family: var(--font-titoli); font-size: 2rem; }

        .item-card { background: white; border-radius: 20px; margin-bottom: 25px; overflow: hidden; border: 1px solid #f0f0f0; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .foto-piatto { width: 100%; height: 280px; position: relative; background-color: #fafafa; }
        
        /* BOTTONE AR */
        .ar-btn { 
            position: absolute; bottom: 20px; right: 20px; background: #000; color: white; 
            border: none; padding: 12px 20px; border-radius: 50px; font-weight: 600; 
            display: flex; align-items: center; gap: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        model-viewer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

        .info { padding: 15px; }
        .price { color: #c0392b; font-weight: 700; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="install-modal">
    <div class="modal-content">
        <h3>Benvenuto</h3>
        <p>Vuoi installare l'app per usarla offline o continuare sul web?</p>
        <button class="btn-install" id="btn-install-pwa">INSTALLA APP</button>
        <button class="btn-web" onclick="closeModal()">CONTINUA VIA WEB</button>
    </div>
</div>

<div id="app-container">
    <header id="header-logo"></header>

    <div id="scr-landing" class="screen active">
        <div id="macro-container"></div>
    </div>

    <div id="scr-items" class="screen">
        <div class="top-bar">
            <div class="back-btn" onclick="location.reload()">← Home</div>
            <div id="filter-container"></div>
        </div>
        <div id="items-list"></div>
    </div>
</div>

<script src="config.js"></script>
<script>
    let deferredPrompt;

    // Gestione Installazione PWA
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-modal').style.display = 'flex';
    });

    document.getElementById('btn-install-pwa').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
        }
        closeModal();
    });

    function closeModal() { document.getElementById('install-modal').style.display = 'none'; }

    function init() {
        if (typeof APP_CONFIG === 'undefined') return;
        document.documentElement.style.setProperty('--colore-principale', APP_CONFIG.colori.principale);
        const header = document.getElementById('header-logo');
        header.innerHTML = `<h1 class="logo-testo">${APP_CONFIG.testoLogo}</h1>`;

        const container = document.getElementById('macro-container');
        if(MENU_DATA.food.length > 0) {
            container.innerHTML += `<div class="btn-macro" onclick="renderMenu('food')"><img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600"><span>CIBO</span></div>`;
        }
        if(MENU_DATA.drinks.length > 0) {
            container.innerHTML += `<div class="btn-macro" onclick="renderMenu('drinks')"><img src="https://images.unsplash.com/photo-1470337458703-46ad1756a187?w=600"><span>DRINKS</span></div>`;
        }
    }

    function renderMenu(type, filter = false) {
        const list = document.getElementById('items-list');
        list.innerHTML = '';
        
        MENU_DATA[type].forEach(cat => {
            cat.piatti.forEach(p => {
                let html = `<div class="item-card">`;
                
                if(type === 'food') {
                    html += `<div class="foto-piatto" style="background-image: url('${p.f}')">`;
                    if(p.m) {
                        // AR OTTIMIZZATA PER TAVOLO
                        html += `<model-viewer 
                                    src="${p.m}" 
                                    ar 
                                    ar-modes="scene-viewer quick-look webxr" 
                                    ar-placement="floor"
                                    ar-scale="fixed"
                                    scale="1 1 1"
                                    camera-controls 
                                    touch-action="none"
                                    reveal="manual">
                                    <button slot="ar-button" class="ar-btn" onclick="alert('L\'app userà la fotocamera per posizionare il piatto sul tavolo')">
                                        VEDI SUL TAVOLO 📦
                                    </button>
                                 </model-viewer>`;
                    }
                    html += `</div>`;
                }

                html += `<div class="info">
                            <div style="display:flex; justify-content:space-between"><b>${p.n}</b> <span class="price">${p.p}</span></div>
                            <p style="font-size:0.85rem; color:#666">${p.d}</p>
                         </div></div>`;
                list.innerHTML += html;
            });
        });

        document.getElementById('scr-landing').classList.remove('active');
        document.getElementById('scr-items').classList.add('active');
    }

    window.onload = init;
</script>
</body>
</html>
