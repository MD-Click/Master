<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu 3D Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --light: #fdfdfd; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--light); color: var(--dark); }
        header { text-align: center; padding: 60px 20px; background: white; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2.5rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .category-title { text-align: center; padding: 20px; background: #f4f4f4; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .menu-grid { padding: 20px; max-width: 800px; margin: auto; }
        .item-card { background: white; border-radius: 15px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .item-info { padding: 20px; }
        .item-header { display: flex; justify-content: space-between; align-items: baseline; }
        .item-price { color: var(--gold); font-weight: 600; }
        .ar-badge { background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: 700; margin-bottom: 10px; display: inline-block; }
        model-viewer { width: 100%; height: 350px; background: #f9f9f9; }
        .ar-btn { background: var(--dark); color: white; border: none; width: 100%; padding: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; border-radius: 0 0 15px 15px; }
    </style>
</head>
<body>

<header>
    <h1 class="logo">MEYS GRILL</h1>
    <p>Realtà Aumentata Experience</p>
</header>

<div class="category-title">Platos Principales</div>

<div class="menu-grid" id="menu-content">
    <div class="item-card">
        <model-viewer src="piatto.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1" auto-rotate>
            <button slot="ar-button" class="ar-btn">🥘 VEDI SUL TUO TAVOLO</button>
        </model-viewer>
        <div class="item-info">
            <div class="ar-badge">DISPONIBILE IN 3D</div>
            <div class="item-header">
                <h2>Paella de Marisco</h2>
                <span class="item-price">18.50€</span>
            </div>
            <p>Cocinada a leña con marisco fresco de la costa.</p>
        </div>
    </div>

    <div class="item-card">
        <div style="background: #eee; height: 200px; display: flex; align-items: center; justify-content: center; color: #999;">
            [Foto del Piatto]
        </div>
        <div class="item-info">
            <div class="item-header">
                <h2>Fideuà de Gandía</h2>
                <span class="item-price">16.00€</span>
            </div>
            <p>Fideo fino con caldo de pescado intenso y alioli.</p>
        </div>
    </div>
</div>

<footer style="text-align: center; padding: 40px; color: #ccc; font-size: 0.8rem;">
    Powered by Mirko 3D Menu Tech
</footer>

</body>
</html>
