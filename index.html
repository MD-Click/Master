<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Digitale AR - Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        :root {
            --colore-principale: #c5a059;
            --colore-sfondo: #f8f8f8;
            --colore-testo: #1a1a1a;
            --colore-pulsante: #1a1a1a;
            --font-titoli: 'Playfair Display', serif;
            --font-corpo: 'Poppins', sans-serif;
        }

        body { font-family: var(--font-corpo); margin: 0; background: var(--colore-sfondo); color: var(--colore-testo); }
        header { text-align: center; padding: 20px; background: white; border-bottom: 1px solid #ddd; }
        .logo-testo { font-family: var(--font-titoli); font-size: 2rem; margin: 0; text-transform: uppercase; }

        .screen { display: none; padding: 20px; box-sizing: border-box; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }

        /* FILTRI */
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px; scrollbar-width: none; }
        .filter-chip { 
            padding: 8px 15px; background: white; border: 1px solid #ddd; border-radius: 20px; 
            white-space: nowrap; cursor: pointer; font-size: 0.9rem; transition: 0.3s;
        }
        .filter-chip.active { background: var(--colore-principale); color: white; border-color: var(--colore-principale); }

        /* GRID & CARDS */
        .landing-grid { display: flex; flex-direction: column; gap: 15px; }
        .btn-macro { 
            height: 180px; border-radius: 20px; position: relative; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
        }
        .btn-macro img { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
        .btn-macro span { position: relative; color: white; font-size: 2.2rem; font-family: var(--font-titoli); z-index: 2; }

        .cat-card { height: 120px; border-radius: 15px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .cat-card img { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        .cat-card span { position: relative; color: white; font-size: 1.6rem; font-family: var(--font-titoli); }

        .item-card { background: white; border-radius: 20px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .foto-piatto { width: 100%; height: 240px; background-size: cover; background-position: center; position: relative; }
        .item-info { padding: 15px; }
        .item-header { display: flex; justify-content: space-between; align-items: baseline; }
        .item-price { color: var(--colore-principale); font-weight: 700; }
        
        .ar-btn { 
            background: var(--colore-pulsante); color: white; border: none; padding: 12px; 
            border-radius: 50px; position: absolute; bottom: 15px; left: 10%; width: 80%; font-weight: bold;
        }

        .back-bar { padding: 10px 0; color: var(--colore-principale); cursor: pointer; font-weight: 600; margin-bottom: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header id="main-header"></header>

<div id="scr-landing" class="screen active">
    <div class="landing-grid" id="macro-container"></div>
</div>

<div id="scr-categories" class="screen">
    <div class="back-bar" onclick="navToLanding()" id="btn-back-home"></div>
    <div id="cat-list"></div>
</div>

<div id="scr-items" class="screen">
    <div class="back-bar" id="btn-back-cat"></div>
    <div class="filter-bar" id="filter-bar"></div>
    <div id="items-list"></div>
</div>

<script>
/* =========================================================================
   1. CONFIGURAZIONE INTERFACCIA E TRADUZIONI 
   ========================================================================= */
const UI_LABELS = {
    it: { backHome: "← TORNA ALLA HOME", backCat: "← CATEGORIE", arBtn: "✨ VEDI SUL TAVOLO", all: "Tutti", glutenFree: "Senza Glutine", food: "CIBO", drinks: "BEVANDE" },
    en: { backHome: "← BACK TO HOME", backCat: "← CATEGORIES", arBtn: "✨ VIEW ON TABLE", all: "All", glutenFree: "Gluten Free", food: "FOOD", drinks: "DRINKS" },
    es: { backHome: "← VOLVER AL INICIO", backCat: "← CATEGORÍAS", arBtn: "✨ VER EN LA MESA", all: "Todos", glutenFree: "Sin Gluten", food: "COMIDA", drinks: "BEBIDAS" }
};

const APP_CONFIG = {
    testoLogo: "MEYS GRILL",
    colori: { principale: "#c5a059", sfondo: "#f8f8f8", testo: "#1a1a1a", pulsanteAR: "#1a1a1a" }
};

/* =========================================================================
   2. DATI MENU (Traduzioni incluse per ogni piatto)
   ========================================================================= */
const MENU_DATA = {
    food: [
        { 
            id: "principali", 
            nome: { it: "Piatti Principali", en: "Main Courses", es: "Platos Principales" },
            foto: "https://images.unsplash.com/photo-1512058560566-427a19db01cc?w=400",
            piatti: [
                { 
                    n: { it: "Paella di Pesce", en: "Seafood Paella", es: "Paella de Marisco" }, 
                    p: "18.50€", 
                    d: { it: "Cucinata a legna con pesce fresco.", en: "Wood-fired with fresh seafood.", es: "Cocinada a leña con marisco fresco." }, 
                    a: "🦐, 🐚", 
                    isGlutenFree: true,
                    f: "https://images.unsplash.com/photo-1534080564583-6be75777b70a?w=600",
                    m: "piatto.glb" 
                },
                { 
                    n: { it: "Fideuà", en: "Fideuà Pasta", es: "Fideuà" }, 
                    p: "16.00€", 
                    d: { it: "Pasta corta in brodo di pesce.", en: "Short pasta in fish broth.", es: "Pasta corta en caldo de pescado." }, 
                    a: "🦐, 🌾", 
                    isGlutenFree: false,
                    f: "https://images.unsplash.com/photo-1515443961218-a51367888e4b?w=600",
                    m: "" 
                }
            ]
        }
    ],
    drinks: [
        { 
            id: "vini", 
            nome: { it: "Vini", en: "Wines", es: "Vinos" },
            foto: "https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=400",
            piatti: [
                { n: { it: "Vino Bianco", en: "White Wine", es: "Vino Blanco" }, p: "15.00€", d: { it: "Fresco e fruttato", en: "Fresh and fruity", es: "Fresco y frutado" }, a: "🍷", isGlutenFree: true, f: "https://images.unsplash.com/photo-1506377247377-2a5b3b417ebb?w=600", m: "" }
            ]
        }
    ]
};

/* =========================================================================
   3. LOGICA DELL'APPLICAZIONE
   ========================================================================= */
let lang = 'it'; // Default
let currentMacro = 'food';
let currentFilter = 'all';

function initApp() {
    // Rileva lingua
    const userLang = navigator.language || navigator.userLanguage;
    const shortLang = userLang.split('-')[0];
    if (UI_LABELS[shortLang]) lang = shortLang;

    // Colori
    document.documentElement.style.setProperty('--colore-principale', APP_CONFIG.colori.principale);
    document.getElementById('main-header').innerHTML = `<h1 class="logo-testo">${APP_CONFIG.testoLogo}</h1>`;
    
    renderLanding();
}

function renderLanding() {
    const container = document.getElementById('macro-container');
    container.innerHTML = `
        <div class="btn-macro" onclick="navToCategories('food')">
            <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600">
            <span>${UI_LABELS[lang].food}</span>
        </div>
        <div class="btn-macro" onclick="navToCategories('drinks')">
            <img src="https://images.unsplash.com/photo-1551024709-8f23befc6f87?w=600">
            <span>${UI_LABELS[lang].drinks}</span>
        </div>
    `;
}

function navToLanding() { switchScreen('scr-landing'); }

function navToCategories(type) {
    currentMacro = type;
    document.getElementById('btn-back-home').innerText = UI_LABELS[lang].backHome;
    const container = document.getElementById('cat-list');
    container.innerHTML = '';
    MENU_DATA[type].forEach(cat => {
        container.innerHTML += `
            <div class="cat-card" onclick="navToItems('${cat.id}')">
                <img src="${cat.foto}">
                <span>${cat.nome[lang]}</span>
            </div>`;
    });
    switchScreen('scr-categories');
}

function navToItems(catId) {
    const catObj = MENU_DATA[currentMacro].find(c => c.id === catId);
    document.getElementById('btn-back-cat').innerText = UI_LABELS[lang].backCat;
    document.getElementById('btn-back-cat').onclick = () => navToCategories(currentMacro);
    
    renderFilters(catId);
    renderItems(catObj);
    switchScreen('scr-items');
}

function renderFilters(catId) {
    const bar = document.getElementById('filter-bar');
    bar.innerHTML = `
        <div class="filter-chip ${currentFilter==='all'?'active':''}" onclick="setFilter('all', '${catId}')">${UI_LABELS[lang].all}</div>
        <div class="filter-chip ${currentFilter==='gf'?'active':''}" onclick="setFilter('gf', '${catId}')">🚫 ${UI_LABELS[lang].glutenFree}</div>
    `;
}

function setFilter(f, catId) {
    currentFilter = f;
    navToItems(catId); // Refresh
}

function renderItems(catObj) {
    const container = document.getElementById('items-list');
    container.innerHTML = `<h2 style="font-family:var(--font-titoli)">${catObj.nome[lang]}</h2>`;
    
    const filtrati = catObj.piatti.filter(p => currentFilter === 'all' || (currentFilter === 'gf' && p.isGlutenFree));

    filtrati.forEach(p => {
        let html = `<div class="item-card">`;
        if(p.m) {
            html += `
                <model-viewer src="${p.m}" ar ar-modes="scene-viewer quick-look webxr" ar-scale="auto" style="width:100%; height:240px;">
                    <div slot="poster" class="foto-piatto" style="background-image: url('${p.f}');"></div>
                    <button slot="ar-button" class="ar-btn">${UI_LABELS[lang].arBtn}</button>
                </model-viewer>`;
        } else {
            html += `<div class="foto-piatto" style="background-image: url('${p.f}');"></div>`;
        }

        html += `
            <div class="item-info">
                <div class="item-header"><h3>${p.n[lang]}</h3><span class="item-price">${p.p}</span></div>
                <div style="font-size:1.1rem; margin:5px 0">${p.a} ${p.isGlutenFree ? ' <small>(GF)</small>' : ''}</div>
                <p style="color:#666; font-size:0.9rem">${p.d[lang]}</p>
            </div></div>`;
        container.innerHTML += html;
    });
}

function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
}

initApp();
</script>
</body>
</html>
