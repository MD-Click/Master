<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meys Grill - Menu AR Completo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        :root {
            --colore-principale: #c5a059; --colore-sfondo: #f8f8f8;
            --colore-testo: #1a1a1a; --colore-pulsante: #1a1a1a;
            --font-titoli: 'Playfair Display', serif; --font-corpo: 'Poppins', sans-serif;
        }
        body { font-family: var(--font-corpo); margin: 0; background: var(--colore-sfondo); color: var(--colore-testo); }
        header { text-align: center; padding: 20px; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .logo-testo { font-family: var(--font-titoli); font-size: 1.8rem; margin: 0; text-transform: uppercase; }
        .screen { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }
        .cat-card { height: 150px; border-radius: 15px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .cat-card img { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        .cat-card span { position: relative; color: white; font-size: 1.8rem; font-family: var(--font-titoli); text-shadow: 1px 1px 4px rgba(0,0,0,0.7); }
        .item-card { background: white; border-radius: 20px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 8px 15px rgba(0,0,0,0.06); }
        .foto-piatto { width: 100%; height: 220px; background-size: cover; background-position: center; position: relative; }
        .item-info { padding: 15px; }
        .item-header { display: flex; justify-content: space-between; align-items: baseline; }
        .item-price { color: var(--colore-principale); font-weight: 700; font-size: 1.1rem; }
        .ar-btn { background: var(--colore-pulsante); color: white; border: none; padding: 10px; border-radius: 50px; position: absolute; bottom: 15px; left: 10%; width: 80%; font-weight: bold; cursor: pointer; }
        .back-btn { color: var(--colore-principale); cursor: pointer; font-weight: 600; margin-bottom: 15px; display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header><h1 class="logo-testo">MEYS GRILL</h1></header>

<div id="scr-categories" class="screen active">
    <div id="cat-list">
        <div class="cat-card" onclick="navToItems('Platos Principales')">
            <img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD...INCOLLA_DA_CATEGORIE_CSV..." alt="Platos Principales">
            <span>PLATOS PRINCIPALES</span>
        </div>
        </div>
</div>

<div id="scr-items" class="screen">
    <span class="back-btn" onclick="showCategories()">← TORNA ALLE CATEGORIE</span>
    <div id="items-list"></div>
</div>

<script>
// Database completo estratto dai tuoi file [cite: 2, 5]
const MENU_DATA = {
    "Platos Principales": [
        {
            nome: "Paella de Marisco Estilo Burriana",
            prezzo: "18.50€",
            desc: "Cocinada a leña con marisco fresco de la costa.",
            allergeni: "🦐, 🐚, 🐟",
            foto: "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD...INCOLLA_DA_MENU_CSV...",
            modello: "https://desiomirko-oss.github.io/Modelli-3d/paella.glb" // Ho aggiunto .glb per compatibilità
        }
        // Qui verranno inseriti tutti gli altri piatti presenti nel file Menu (1).csv
    ]
};

function navToItems(catId) {
    const list = document.getElementById('items-list');
    list.innerHTML = `<h2 style="font-family:var(--font-titoli)">${catId}</h2>`;
    
    MENU_DATA[catId].forEach(p => {
        list.innerHTML += `
            <div class="item-card">
                ${p.modello ? `
                <model-viewer src="${p.modello}" ar ar-modes="scene-viewer quick-look webxr" reveal="manual" style="width:100%; height:220px;">
                    <div slot="poster" class="foto-piatto" style="background-image: url('${p.foto}');"></div>
                    <button slot="ar-button" class="ar-btn">✨ VEDI SUL TAVOLO</button>
                </model-viewer>` : `<div class="foto-piatto" style="background-image: url('${p.foto}');"></div>`}
                <div class="item-info">
                    <div class="item-header">
                        <h3>${p.nome}</h3>
                        <span class="item-price">${p.prezzo}</span>
                    </div>
                    <p style="font-size:0.9rem; color:#666;">${p.desc}</p>
                    <div style="margin-top:10px;">${p.allergeni}</div>
                </div>
            </div>`;
    });
    
    document.getElementById('scr-categories').classList.remove('active');
    document.getElementById('scr-items').classList.add('active');
}

function showCategories() {
    document.getElementById('scr-items').classList.remove('active');
    document.getElementById('scr-categories').classList.add('active');
}
</script>
</body>
</html>
