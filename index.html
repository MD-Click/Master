<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushi Time Nerja - Menu AR Fisso</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        :root {
            --oro: #c5a059; --nero: #1a1a1a; --bianco: #ffffff;
            --font-titoli: 'Playfair Display', serif; --font-corpo: 'Poppins', sans-serif;
        }
        body { font-family: var(--font-corpo); margin: 0; background: #f8f8f8; }
        header { text-align: center; padding: 20px; background: var(--bianco); border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .screen { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        .screen.active { display: block; animation: fadeIn 0.4s ease-out; }
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .cat-card { position: relative; height: 150px; border-radius: 15px; overflow: hidden; cursor: pointer; }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
        .cat-card span { position: absolute; bottom: 15px; left: 10px; color: white; font-family: var(--font-titoli); font-size: 1.2rem; }
        .item-card { background: white; border-radius: 20px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .item-info { padding: 15px; }
        .price { color: var(--oro); font-weight: 700; font-size: 1.2rem; }
        
        /* BLOCCO AR: INTERAZIONE DISABILITATA */
        model-viewer { 
            width: 100%; height: 300px; background: #eee;
            pointer-events: none; /* Impedisce il tocco sul modello nella lista */
        }
        .ar-button {
            background: var(--nero); color: white; border: none; padding: 12px 20px;
            border-radius: 50px; position: absolute; bottom: 15px; right: 15px; 
            font-weight: 600; pointer-events: auto; /* Riabilita il tocco solo sul pulsante */
        }

        .back-btn { padding: 10px 0; color: var(--oro); cursor: pointer; font-weight: 600; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header><h1 style="font-family: var(--font-titoli); margin:0;">SUSHI TIME NERJA</h1></header>

<div id="scr-home" class="screen active">
    <div class="category-grid" id="cat-container"></div>
</div>

<div id="scr-items" class="screen">
    <div class="back-btn" onclick="navToHome()" id="ui-back"></div>
    <div id="items-list"></div>
</div>

<script>
const TRANSLATIONS = {
    "it": { "indietro": "← Indietro", "ar-btn": "VEDI SUL TAVOLO", "Platos Principales": "Piatti Principali", "Entrantes": "Antipasti", "Vinos": "Vini" },
    "en": { "indietro": "← Back", "ar-btn": "VIEW ON TABLE", "Platos Principales": "Main Courses", "Entrantes": "Starters", "Vinos": "Wines" },
    "de": { "indietro": "← Zurück", "ar-btn": "AUF DEM TISCH SEHEN", "Platos Principales": "Hauptgerichte", "Entrantes": "Vorspeisen", "Vinos": "Weine" },
    "es": { "indietro": "← Volver", "ar-btn": "VER EN LA MESA", "Platos Principales": "Platos Principales", "Entrantes": "Entrantes", "Vinos": "Vinos" },
    "fr": { "indietro": "← Retour", "ar-btn": "VOIR SUR LA TABLE", "Platos Principales": "Plats Principaux", "Entrantes": "Entrées", "Vinos": "Vins" },
    "zh": { "indietro": "← 返回", "ar-btn": "在桌上查看", "Platos Principales": "主菜", "Entrantes": "前菜", "Vinos": "葡萄酒" },
    "pl": { "indietro": "← Powrót", "ar-btn": "ZOBACZ NA STOLE", "Platos Principales": "Dania Główne", "Entrantes": "Przystawki", "Vinos": "Wina" },
    "sv": { "indietro": "← Tillbaka", "ar-btn": "VISA PÅ BORDET", "Platos Principales": "Huvudrätter", "Entrantes": "Förrätter", "Vinos": "Viner" }
};

// DATI DAI TUOI FOGLI
const CATEGORIES = [
    { nome: "Platos Principales", img: "https://images.unsplash.com/photo-1512058560566-427a19db01cc?w=400" },
    { nome: "Entrantes", img: "https://images.unsplash.com/photo-1541529086526-db283c563270?w=400" },
    { nome: "Vinos", img: "https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=400" }
];

const MENU_ITEMS = [
    { n: "Paella de Marisco", cat: "Platos Principales", d: "Cocinada a leña con marisco fresco de la costa.", p: "18.50€", a: "🦐, 🐚, 🐟", m: "piatto.glb", f: "https://images.unsplash.com/photo-1534080564583-6be75777b70a?w=600" },
    { n: "Gambas al Ajillo", cat: "Entrantes", d: "Gamberetti saltati con aglio, olio e peperoncino.", p: "12.00€", a: "🦐", m: "", f: "https://images.unsplash.com/photo-1625937751876-4cb6342893fa?w=600" },
    { n: "Albariño D.O.", cat: "Vinos", d: "Vino fresco Galiziano.", p: "22.00€", a: "🍷", m: "", f: "https://images.unsplash.com/photo-1506377247377-2a5b3b417ebb?w=600" }
];

let currentLang = navigator.language.split('-')[0];
if (!TRANSLATIONS[currentLang]) currentLang = "it";

function t(key) { return (TRANSLATIONS[currentLang] && TRANSLATIONS[currentLang][key]) ? TRANSLATIONS[currentLang][key] : key; }

function init() {
    const container = document.getElementById('cat-container');
    CATEGORIES.forEach(c => {
        container.innerHTML += `<div class="cat-card" onclick="showCategory('${c.nome}')"><img src="${c.img}"><span>${t(c.nome)}</span></div>`;
    });
}

function showCategory(catName) {
    const list = document.getElementById('items-list');
    document.getElementById('ui-back').innerText = t('indietro');
    list.innerHTML = `<h2 style="font-family:var(--font-titoli)">${t(catName)}</h2>`;
    
    MENU_ITEMS.filter(i => i.cat === catName).forEach(p => {
        list.innerHTML += `
            <div class="item-card">
                ${p.m ? `
                    <model-viewer src="${p.m}" ar ar-modes="quick-look scene-viewer" 
                        interaction-prompt="none" 
                        shadow-intensity="1" 
                        auto-rotate
                        poster="${p.f}">
                        <button slot="ar-button" class="ar-button">${t('ar-btn')}</button>
                    </model-viewer>` : 
                    `<img src="${p.f}" style="width:100%; height:250px; object-fit:cover;">`
                }
                <div class="item-info">
                    <div style="display:flex; justify-content:space-between;"><h3>${p.n}</h3><span class="price">${p.p}</span></div>
                    <p style="color:#666; font-size:0.9rem;">${p.d}</p>
                    <div style="font-size:1.2rem;">${p.a}</div>
                </div>
            </div>`;
    });
    switchScreen('scr-items');
}

function navToHome() { switchScreen('scr-home'); }
function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
}

init();
</script>
</body>
</html>
