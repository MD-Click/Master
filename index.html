<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEYS GRILL - AR Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        :root { --main: #c5a059; --dark: #1a1a1a; --white: #ffffff; --bg: #f8f8f8; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: var(--dark); }
        
        /* Navigazione Schermate */
        .screen { display: none; min-height: 100vh; width: 100%; box-sizing: border-box; }
        .screen.active { display: block; animation: slideIn 0.3s ease-out; }

        header { text-align: center; padding: 30px 20px; background: var(--white); border-bottom: 1px solid #eee; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2rem; margin: 0; text-transform: uppercase; cursor: pointer; }

        /* 1. LANDING PAGE */
        .landing-container { padding: 20px; display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }
        .btn-main { 
            height: 200px; border-radius: 20px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .btn-main img { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        .btn-main span { position: relative; color: white; font-size: 2.5rem; font-family: 'Playfair Display'; font-weight: 700; z-index: 10; }

        /* 2. CATEGORIE */
        .grid { padding: 20px; display: grid; gap: 15px; }
        .cat-card { 
            height: 120px; border-radius: 15px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .cat-card img { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
        .cat-card span { position: relative; color: white; font-size: 1.5rem; font-weight: 600; }

        /* 3. LISTA PIATTI */
        .item-card { background: var(--white); border-radius: 15px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .item-info { padding: 20px; }
        .item-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .item-price { color: var(--main); font-weight: 700; }
        model-viewer { width: 100%; height: 300px; background: #eee; }
        .ar-btn { background: var(--dark); color: white; border: none; width: 100%; padding: 15px; font-weight: 600; cursor: pointer; }

        .back-bar { padding: 15px 20px; background: #eee; display: flex; align-items: center; cursor: pointer; font-weight: 600; color: var(--main); }

        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<header><h1 class="logo" onclick="location.reload()">MEYS GRILL</h1></header>

<div id="scr-landing" class="screen active">
    <div class="landing-container">
        <div class="btn-main" onclick="navToCategories('food')">
            <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600">
            <span>FOOD</span>
        </div>
        <div class="btn-main" onclick="navToCategories('drinks')">
            <img src="https://images.unsplash.com/photo-1551024709-8f23befc6f87?w=600">
            <span>DRINKS</span>
        </div>
    </div>
</div>

<div id="scr-categories" class="screen">
    <div class="back-bar" onclick="navToLanding()">← TORNA ALLA SCELTA</div>
    <div id="cat-grid" class="grid"></div>
</div>

<div id="scr-items" class="screen">
    <div id="back-to-cat-btn" class="back-bar">← TORNA ALLE CATEGORIE</div>
    <div id="items-list" style="padding: 20px;"></div>
</div>

<script>
/* --- CONFIGURAZIONE FACILE --- */
const DATA = {
    food: [
        { id: "p1", nome: "Principales", foto: "https://images.unsplash.com/photo-1512058560566-427a19db01cc?w=400", 
          items: [
              { n: "Paella de Marisco", p: "18.50€", d: "Riso bomba e frutti di mare.", m: "piatto.glb" },
              { n: "Fideuà", p: "16.00€", d: "Pasta corta e brodo di pesce.", m: "" }
          ]
        },
        { id: "e1", nome: "Entrantes", foto: "https://images.unsplash.com/photo-1541529086526-db283c563270?w=400",
          items: [
              { n: "Gambas al Ajillo", p: "12.00€", d: "Gamberetti aglio e olio.", m: "" }
          ]
        }
    ],
    drinks: [
        { id: "d1", nome: "Vini", foto: "https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=400",
          items: [
              { n: "Albariño", p: "22.00€", d: "Vino bianco Galiziano.", m: "" }
          ]
        }
    ]
};

/* --- MOTORE DI NAVIGAZIONE --- */
let activeType = '';

function navToLanding() {
    switchScreen('scr-landing');
}

function navToCategories(type) {
    activeType = type;
    const grid = document.getElementById('cat-grid');
    grid.innerHTML = '';
    
    DATA[type].forEach(cat => {
        grid.innerHTML += `
            <div class="cat-card" onclick="navToItems('${cat.id}')">
                <img src="${cat.foto}">
                <span>${cat.nome}</span>
            </div>`;
    });
    switchScreen('scr-categories');
}

function navToItems(catId) {
    const category = DATA[activeType].find(c => c.id === catId);
    const list = document.getElementById('items-list');
    list.innerHTML = `<h2 style="font-family:'Playfair Display'">${category.nome}</h2>`;
    
    category.items.forEach(item => {
        let html = `<div class="item-card">`;
        if(item.m) html += `<model-viewer src="${item.m}" ar ar-modes="webxr" camera-controls shadow-intensity="1"><button slot="ar-button" class="ar-btn">🥘 VEDI IN 3D</button></model-viewer>`;
        html += `<div class="item-info">
                    <div class="item-header"><h3>${item.n}</h3><span class="item-price">${item.p}</span></div>
                    <p>${item.d}</p>
                 </div></div>`;
        list.innerHTML += html;
    });

    document.getElementById('back-to-cat-btn').onclick = () => navToCategories(activeType);
    switchScreen('scr-items');
}

function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
}
</script>
</body>
</html>
