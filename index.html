<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prova AR Maestro</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; }
        model-viewer {
            width: 100%;
            height: 90vh;
            background-color: #f0f0f0;
        }
        .controls {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="test.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        poster="poster.webp" 
        shadow-intensity="1" 
        auto-rotate>
        
        <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; padding: 10px;">
            👋 Visualizza in AR
        </button>

    </model-viewer>

    <div class="controls">
        <h1>Progetto Maestro</h1>
        <p>Inquadra l'oggetto e premi il tasto AR per vederlo nel tuo spazio.</p>
    </div>

</body>
</html>
