<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu AR Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        :root { --colore-principale: #000; --font-titoli: 'Playfair Display', serif; --font-corpo: 'Poppins', sans-serif; }
        body { font-family: var(--font-corpo); margin: 0; background: #fff; color: #1a1a1a; overflow-x: hidden; }

        header { text-align: center; padding: 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 100; }
        .logo-testo { font-family: var(--font-titoli); font-size: 1.4rem; margin: 0; }

        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }

        /* LAYOUT QUADRATO MACRO CATEGORIE */
        #macro-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-macro { 
            aspect-ratio: 1 / 1; border-radius: 20px; position: relative; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; 
        }
        .btn-macro img { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        .btn-macro span { position: relative; color: white; font-family: var(--font-titoli); font-size: 1.2rem; font-weight: 700; text-transform: uppercase; }

        /* SOTTOCATEGORIE STYLE CARDS */
        .subcat-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .subcat-card { 
            background: #f8f8f8; padding: 20px; border-radius: 15px; 
            text-align: center; font-weight: 600; font-size: 1.1rem; 
            border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        /* TOP BAR & FILTRI */
        .top-bar { display: flex; flex-direction: column; margin-bottom: 20px; gap: 15px; }
        .back-btn { background: #000; color: white; padding: 8px 15px; border-radius: 10px; font-size: 0.8rem; border: none; align-self: flex-start; }
        .filter-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .filter-btn { border: 1px solid #ddd; background: #fff; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; white-space: nowrap; }
        .filter-btn.active { background: var(--colore-principale); color: white; border-color: var(--colore-principale); }

        /* PRODOTTI */
        .item-card { background: white; border-radius: 20px; margin-bottom: 25px; overflow: hidden; border: 1px solid #f0f0f0; box-shadow: 0 5px 15px rgba(0,0,0,0.04); }
        .foto-piatto { width: 100%; height: 250px; position: relative; background-size: cover; background-position: center; }
        
        .ar-btn { 
            position: absolute; bottom: 15px; right: 15px; background: rgba(255,255,255,0.9); 
            color: #000; border: none; padding: 10px 15px; border-radius: 50px; 
            font-weight: 700; font-size: 0.7rem; display: flex; align-items: center; gap: 5px;
        }

        .info { padding: 15px; }
        .price { color: var(--colore-principale); font-weight: 700; }
        .desc { font-size: 0.85rem; color: #666; margin: 8px 0; }
        .allergens { font-size: 0.7rem; color: #a00; font-style: italic; margin-top: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header id="header-logo"></header>

<div id="app-container">
    <div id="scr-landing" class="screen active">
        <div id="macro-container"></div>
    </div>

    <div id="scr-subcats" class="screen">
        <button class="back-btn" onclick="showScreen('scr-landing')">← Home</button>
        <h2 id="subcat-title" style="font-family: var(--font-titoli); margin: 20px 0;"></h2>
        <div id="subcat-list" class="subcat-grid"></div>
    </div>

    <div id="scr-items" class="screen">
        <div class="top-bar">
            <button class="back-btn" id="back-to-sub">← Indietro</button>
            <div id="filter-container" class="filter-container"></div>
        </div>
        <div id="items-list"></div>
    </div>
</div>

<script src="config.js"></script>
<script>
    let currentType = '';

    window.onload = () => {
        if (typeof APP_CONFIG !== 'undefined') {
            document.documentElement.style.setProperty('--colore-principale', APP_CONFIG.colori.principale);
            document.getElementById('header-logo').innerHTML = `<h1 class="logo-testo">${APP_CONFIG.testoLogo}</h1>`;
            renderMacros();
        }
    };

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        window.scrollTo(0,0);
    }

    function renderMacros() {
        const container = document.getElementById('macro-container');
        container.innerHTML = `
            <div class="btn-macro" onclick="renderSubCats('food')">
                <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600">
                <span>Cucina</span>
            </div>
            <div class="btn-macro" onclick="renderSubCats('drinks')">
                <img src="https://images.unsplash.com/photo-1470337458703-46ad1756a187?w=600">
                <span>Cantina</span>
            </div>
        `;
    }

    function renderSubCats(type) {
        currentType = type;
        const list = document.getElementById('subcat-list');
        document.getElementById('subcat-title').innerText = type === 'food' ? 'La Cucina' : 'La Cantina';
        list.innerHTML = '';

        MENU_DATA[type].forEach((cat, index) => {
            list.innerHTML += `<div class="subcat-card" onclick="renderItems(${index})">${cat.categoria}</div>`;
        });
        showScreen('scr-subcats');
    }

    function renderItems(catIndex, activeFilter = null) {
        const cat = MENU_DATA[currentType][catIndex];
        const list = document.getElementById('items-list');
        const filterArea = document.getElementById('filter-container');
        
        document.getElementById('back-to-sub').onclick = () => renderSubCats(currentType);
        list.innerHTML = '';
        filterArea.innerHTML = '';

        // Filtri rapidi
        if(currentType === 'food') {
            filterArea.innerHTML = `<button class="filter-btn ${activeFilter==='gf'?'active':''}" onclick="renderItems(${catIndex}, '${activeFilter==='gf'?null:'gf'}')">🌾 Senza Glutine</button>`;
        }

        cat.piatti.forEach(p => {
            if(activeFilter === 'gf' && !p.glutenFree) return;

            let html = `<div class="item-card">`;
            
            if(currentType === 'food') {
                // Layout CIBO: Foto + Nome + Prezzo + Desc + Allergeni
                html += `<div class="foto-piatto" style="background-image: url('${p.f || 'https://via.placeholder.com/400x400?text=Food'}')">`;
                if(p.m) {
                    html += `<model-viewer src="${p.m}" ar ar-modes="scene-viewer quick-look" ar-placement="floor" shadow-intensity="1" camera-controls touch-action="none" reveal="manual">
                                <button slot="ar-button" class="ar-btn">VEDI IN 3D 📦</button>
                             </model-viewer>`;
                }
                html += `</div>`;
            }

            html += `<div class="info">
                        <div style="display:flex; justify-content:space-between; align-items:baseline;">
                            <b style="font-size:1.1rem">${p.n}</b> 
                            <span class="price">${p.p}</span>
                        </div>
                        <p class="desc">${p.d}</p>
                        ${currentType === 'food' && p.a ? `<div class="allergens">Allergeni: ${p.a}</div>` : ''}
                     </div></div>`;
            list.innerHTML += html;
        });

        showScreen('scr-items');
    }
</script>
</body>
</html>
